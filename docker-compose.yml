services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peleja-api
    ports:
      - "${APP_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__PelejaContext: ${CONNECTION_STRING}
      GIPHY_API_KEY: ${GIPHY_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - peleja-network

  db:
    image: postgres:17-alpine
    container_name: peleja-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - peleja-network

volumes:
  postgres_data:

networks:
  peleja-network:
    driver: bridge
