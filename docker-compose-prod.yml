services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peleja-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PelejaContext: ${CONNECTION_STRING}
      GIPHY_API_KEY: ${GIPHY_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - peleja-network
      - peleja-external

  db:
    image: postgres:17-alpine
    container_name: peleja-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - peleja-network

volumes:
  postgres_data:

networks:
  peleja-network:
    driver: bridge
  peleja-external:
    external: true
